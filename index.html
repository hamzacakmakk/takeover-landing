<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Takeover – Master Your Life</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;700;800&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        overflow-x: hidden !important;
    }

    body {
        background-color: #000000;
        background-image: 
            radial-gradient(at 0% 0%, rgba(245, 146, 26, 0.08) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(255, 255, 255, 0.04) 0px, transparent 50%);
        color: #FAFAFA;
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* Hero Section */
    .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 80px 20px;
        position: relative;
    }

    .hero-content {
        z-index: 2;
        max-width: 800px;
        animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* App Logo */
    .logo-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 40px auto;
        animation: float 6s ease-in-out infinite;
    }

    .logo {
        width: 180px;
        height: 180px;
        border-radius: 36px;
        box-shadow: 0 24px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
        position: relative;
        z-index: 2;
    }

    .logo-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200px;
        height: 200px;
        transform: translate(-50%, -50%);
        background: rgba(245, 146, 26, 0.45);
        filter: blur(50px);
        border-radius: 50%;
        z-index: 1;
    }

    /* Typography */

    .hero h1 {
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        font-size: 4.5rem;
        line-height: 1.1;
        letter-spacing: -0.03em;
        margin-bottom: 24px;
        color: #FFFFFF;
    }

    .hero h1 span {
        background: linear-gradient(135deg, #F5921A, #D4711A);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero p {
        font-size: 1.25rem;
        color: #A1A1AA;
        max-width: 580px;
        margin: 0 auto 48px auto;
        line-height: 1.6;
        font-weight: 400;
    }

    /* Store Buttons */
    .store-buttons {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .store-btn {
        transition: transform 0.2s ease, filter 0.2s ease;
        display: block;
    }

    .store-btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }

    .store-btn img {
        height: 44px;
        width: auto;
    }

    /* Footer */
    footer {
        padding: 40px 20px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        color: #71717A;
        font-size: 0.9rem;
    }

    .footer-links {
        margin-top: 12px;
        display: flex;
        justify-content: center;
        gap: 24px;
    }

    .footer-links a {
        color: #A1A1AA;
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .footer-links a:hover {
        color: #F5921A;
    }

    /* Animations */
    @keyframes slideUpFade {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .hero h1 {
            font-size: 3rem;
        }
        .hero p {
            font-size: 1.1rem;
            padding: 0 10px;
        }
        .logo {
            width: 140px;
            height: 140px;
        }
        .logo-glow {
            width: 160px;
            height: 160px;
        }
    }

    @media (max-width: 480px) {
        .hero h1 {
            font-size: 2.5rem;
        }
        .store-buttons {
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
    }
</style>
</head>

<body>

<section class="hero">
    <div class="hero-content">
        
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="logo.png" alt="Takeover Logo" class="logo">
        </div>
        
        <h1>Master Your <span>Life.</span></h1>

        <p>
            Takeover is the all-in-one platform to track your habits, manage finances, and optimize your health. Reclaim your time and focus on what matters.
        </p>

        <div class="store-buttons">
            <a class="store-btn" href="https://apps.apple.com/us/app/takeover-all-in-one-tracker/id6760352061" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="Download on the App Store">
            </a>
            <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.hamzacakmak.myApp" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
            </a>
        </div>

    </div>
</section>

<footer>
    <div>© 2026 Takeover — All rights reserved.</div>
    <div class="footer-links">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms of Service</a>
        <a href="mailto:support@takeover.cloud">Support</a>
    </div>
</footer>

</body>
</html>
